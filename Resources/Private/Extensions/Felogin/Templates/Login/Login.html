<html
	xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
	data-namespace-typo3-fluid="true"
>

<f:layout name="Default" />

<f:section name="Main">

	<div class="tx-felogin panel panel-default card">
		<div class="panel-body card-body">

			<f:if condition="{message}">
				<div class="alert alert-info" role="alert">
					{message -> f:format.html()}
				</div>
			</f:if>

			<f:if condition="{isLoggedIn}">
				<f:then>
					<div class="felogin-logout">
						<div class="alert alert-success" role="alert">
							<strong>Angemeldet als:</strong> {user.username}
						</div>

						<f:form
							targetPid="{logoutPid}"
							action="logout"
							method="post"
							class="form felogin-form felogin-form-logout"
						>
							<div class="form-group">
								<f:form.submit
									name="submit"
									value="Abmelden"
									class="btn btn-default btn-secondary"
								/>
							</div>
						</f:form>
					</div>
				</f:then>

				<f:else>

					<f:if condition="{forgotPassword}">
						<f:then>

							<f:if condition="{hashValid}">
								<f:then>
									<div class="felogin-password-recovery">
										<h3 class="h3">Neues Passwort vergeben</h3>

										<f:form
											action="changePassword"
											method="post"
											class="form felogin-form felogin-form-recovery"
										>
											<f:form.hidden name="hash" value="{hash}" />

											<div class="form-group mb-3">
												<label for="felogin-password-1">Neues Passwort</label>
												<f:form.password
													name="password1"
													id="felogin-password-1"
													class="form-control"
													additionalAttributes="{autocomplete: 'new-password'}"
												/>
											</div>

											<div class="form-group mb-3">
												<label for="felogin-password-2">Passwort wiederholen</label>
												<f:form.password
													name="password2"
													id="felogin-password-2"
													class="form-control"
													additionalAttributes="{autocomplete: 'new-password'}"
												/>
											</div>

											<div class="form-group mb-3">
												<f:form.submit
													name="submit"
													value="Passwort speichern"
													class="btn btn-primary"
												/>
											</div>
										</f:form>
									</div>
								</f:then>

								<f:else>
									<div class="felogin-forgot-password">
										<h3 class="h3">Passwort vergessen</h3>

										<f:form
											action="passwordRecovery"
											method="post"
											class="form felogin-form felogin-form-forgot"
										>
											<div class="form-group mb-3">
												<label for="felogin-forgot-email">Benutzername oder E-Mail</label>
												<f:form.textfield
													name="user"
													id="felogin-forgot-email"
													class="form-control"
													additionalAttributes="{autocomplete: 'username'}"
												/>
												<p class="help-block form-text text-muted">
													Gib deinen Benutzernamen oder deine E-Mail-Adresse ein.
												</p>
											</div>

											<div class="form-group mb-3">
												<f:form.submit
													name="submit"
													value="Link zum Zurücksetzen senden"
													class="btn btn-primary"
												/>
												<f:link.action
													action="showLogin"
													class="btn btn-default btn-secondary"
												>
													Zurück zum Login
												</f:link.action>
											</div>
										</f:form>
									</div>
								</f:else>
							</f:if>

						</f:then>

						<f:else>

							<div class="felogin-login">
								<h3 class="h3">Login</h3>

								<f:if condition="{loginError}">
									<div class="alert alert-danger" role="alert">
										Anmeldung fehlgeschlagen. Bitte überprüfe Benutzername und Passwort.
									</div>
								</f:if>

								<f:form
									action="login"
									method="post"
									class="form felogin-form felogin-form-login"
								>
									<div class="form-group mb-3">
										<label for="felogin-user">Benutzername</label>
										<f:form.textfield
											name="user"
											id="felogin-user"
											value="{user}"
											class="form-control"
											additionalAttributes="{autocomplete: 'username'}"
										/>
									</div>

									<div class="form-group mb-3">
										<label for="felogin-pass">Passwort</label>
										<f:form.password
											name="pass"
											id="felogin-pass"
											value=""
											class="form-control"
											additionalAttributes="{autocomplete: 'current-password'}"
										/>
									</div>

									<f:if condition="{permaloginEnabled}">
										<div class="form-group mb-3">
											<div class="checkbox form-check">
												<label class="form-check-label">
													<f:form.checkbox
														name="permalogin"
														value="1"
														class="form-check-input"
													/>
													Angemeldet bleiben
												</label>
											</div>
										</div>
									</f:if>

									<div class="form-group mb-3">
										<f:form.submit
											name="submit"
											value="Anmelden"
											class="btn btn-primary"
										/>
									</div>

									<f:if condition="{showForgotPasswordLink}">
										<div class="form-group mb-0">
											<p class="help-block form-text text-muted">
												<f:link.action action="showForgotPassword">
													Passwort vergessen?
												</f:link.action>
											</p>
										</div>
									</f:if>
								</f:form>
							</div>

						</f:else>
					</f:if>

				</f:else>
			</f:if>

		</div>
	</div>

</f:section>

</html>
